name: CI

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main, stable]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            godot_platform: macos
          - os: ubuntu-latest
            godot_platform: linux
          - os: windows-latest
            godot_platform: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SCons
        run: python -m pip install scons
      - name: Build GDExtension
        run: scons platform=${{ matrix.godot_platform }} target=template_debug -j2
      - name: Package
        run: python scripts/package.py
      - name: Check package shape
        run: python tests/check_package.py
